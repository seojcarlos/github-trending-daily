# .github/workflows/monthly_trending.yml
name: Actualización mensual de trending

on:
  schedule:
    - cron: '0 9 1 * *'  # El día 1 de cada mes a las 9:00 UTC
  workflow_dispatch:

jobs:
  trending_monthly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Ejecutar script mensual
        run: python generate_monthly.py

      - name: Commit y push
        run: |
          git config --global user.name "seojcarlos"
          git config --global user.email "jcarlos@convertiam.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add trending_monthly.md
          if git diff --staged --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "chore: actualización mensual de trending"
            git pull --rebase
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
